<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สนุกกับภาษาจีน ป.4 - ป.6 พร้อมระบบจัดอันดับ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fffbeb; /* Soft yellow background */
            background-image: 
                radial-gradient(#fde68a 2px, transparent 2px),
                radial-gradient(#fde68a 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overscroll-behavior-y: contain; 
        }
        
        /* 3D Game Button Style */
        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.15);
            transform: translateY(0);
        }
        .btn-3d:active {
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.15);
            transform: translateY(6px);
        }
        .btn-3d:disabled {
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.1);
            transform: translateY(4px);
            opacity: 0.7;
        }

        .flip-card { perspective: 1000px; }
        .flip-card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1.5); /* Bouncier flip */
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); }
        
        /* Fun Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fef3c7; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // นำเข้าเฉพาะสิ่งที่จำเป็น ตัด signOut ออกเพราะเราจะไม่ให้ผู้เล่นล็อกเอาท์ (จำค่าเครื่อง)
        import { getAuth, signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence, onAuthStateChanged,
            getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        // ข้อมูลคำศัพท์ (เหมือนเดิม)
        const VOCAB_DATA = {
            beginner: {
                title: "ขั้นต้น (ป.4)", color: "from-green-400 to-emerald-500", icon: "🌱",
                words: [
                    { ch: "你好", pinyin: "nǐ hǎo", th: "สวัสดี" }, { ch: "谢谢", pinyin: "xiè xiè", th: "ขอบคุณ" },
                    { ch: "老师", pinyin: "lǎo shī", th: "คุณครู" }, { ch: "一", pinyin: "yī", th: "หนึ่ง (1)" },
                    { ch: "二", pinyin: "èr", th: "สอง (2)" }, { ch: "三", pinyin: "sān", th: "สาม (3)" },
                    { ch: "爸爸", pinyin: "bà ba", th: "พ่อ" }, { ch: "妈妈", pinyin: "mā ma", th: "แม่" },
                    { ch: "水", pinyin: "shuǐ", th: "น้ำ" }, { ch: "不", pinyin: "bù", th: "ไม่" }
                ]
            },
            intermediate: {
                title: "ขั้นกลาง (ป.5)", color: "from-blue-400 to-indigo-500", icon: "⭐",
                words: [
                    { ch: "苹果", pinyin: "píng guǒ", th: "แอปเปิ้ล" }, { ch: "猫", pinyin: "māo", th: "แมว" },
                    { ch: "狗", pinyin: "gǒu", th: "หมา" }, { ch: "吃", pinyin: "chī", th: "กิน" },
                    { ch: "喝", pinyin: "hē", th: "ดื่ม" }, { ch: "朋友", pinyin: "péng you", th: "เพื่อน" },
                    { ch: "今天", pinyin: "jīn tiān", th: "วันนี้" }, { ch: "明天", pinyin: "míng tiān", th: "พรุ่งนี้" },
                    { ch: "大", pinyin: "dà", th: "ใหญ่" }, { ch: "小", pinyin: "xiǎo", th: "เล็ก" }
                ]
            },
            advanced: {
                title: "ขั้นสูง (ป.6)", color: "from-purple-400 to-pink-500", icon: "🏆",
                words: [
                    { ch: "学校", pinyin: "xué xiào", th: "โรงเรียน" }, { ch: "喜欢", pinyin: "xǐ huān", th: "ชอบ" },
                    { ch: "看书", pinyin: "kàn shū", th: "อ่านหนังสือ" }, { ch: "名字", pinyin: "míng zi", th: "ชื่อ" },
                    { ch: "什么", pinyin: "shén me", th: "อะไร" }, { ch: "高兴", pinyin: "gāo xìng", th: "ดีใจ" },
                    { ch: "漂亮", pinyin: "piào liang", th: "สวย" }, { ch: "汉语", pinyin: "hàn yǔ", th: "ภาษาจีน" },
                    { ch: "去", pinyin: "qù", th: "ไป" }, { ch: "买", pinyin: "mǎi", th: "ซื้อ" }
                ]
            }
        };

        const App = () => {
            const [isFirebaseReady, setIsFirebaseReady] = React.useState(!!window.FirebaseAPI);
            const [appState, setAppState] = React.useState('loading'); 
            const [user, setUser] = React.useState(null);
            
            const [profile, setProfile] = React.useState({ 
                displayName: '', scores: { beginner: 0, intermediate: 0, advanced: 0 }, totalScore: 0,
                learningHistory: { beginner: 0, intermediate: 0, advanced: 0 } 
            });
            const [leaderboardData, setLeaderboardData] = React.useState([]);
            const [dbInstance, setDbInstance] = React.useState(null);
            
            const [currentLevel, setCurrentLevel] = React.useState(null);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);
            const [quizQuestions, setQuizQuestions] = React.useState([]);
            
            // สถานะใหม่สำหรับเกม
            const [onlineUsers, setOnlineUsers] = React.useState(15);
            const [audioUnlocked, setAudioUnlocked] = React.useState(false);
            const [quizFeedback, setQuizFeedback] = React.useState(null); // เก็บว่าตอบถูกหรือผิด
            const [showHint, setShowHint] = React.useState(false); // ตัวช่วยดู Pinyin

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'chinese-kids-app-v3';

            React.useEffect(() => {
                const unlockAudio = () => {
                    if (!audioUnlocked && 'speechSynthesis' in window) {
                        const u = new SpeechSynthesisUtterance('');
                        window.speechSynthesis.speak(u);
                        setAudioUnlocked(true);
                        document.removeEventListener('touchstart', unlockAudio);
                        document.removeEventListener('click', unlockAudio);
                    }
                };
                document.addEventListener('touchstart', unlockAudio);
                document.addEventListener('click', unlockAudio);
                return () => {
                    document.removeEventListener('touchstart', unlockAudio);
                    document.removeEventListener('click', unlockAudio);
                };
            }, [audioUnlocked]);

            React.useEffect(() => {
                if (appState !== 'loading') {
                    localStorage.setItem('chineseApp_savedState_v3', JSON.stringify({
                        appState, currentLevel, currentIndex, score, quizQuestions
                    }));
                }
            }, [appState, currentLevel, currentIndex, score, quizQuestions]);

            const restoreState = () => {
                const saved = localStorage.getItem('chineseApp_savedState_v3');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.appState && parsed.appState !== 'loading') {
                            setCurrentLevel(parsed.currentLevel);
                            setCurrentIndex(parsed.currentIndex);
                            setScore(parsed.score);
                            setQuizQuestions(parsed.quizQuestions || []);
                            setAppState(parsed.appState);
                            return;
                        }
                    } catch(e) {}
                }
                setAppState('home'); 
            };

            React.useEffect(() => {
                const handleReady = () => setIsFirebaseReady(true);
                window.addEventListener('firebase-ready', handleReady);
                
                setOnlineUsers(Math.floor(Math.random() * 40) + 12);
                const interval = setInterval(() => {
                    setOnlineUsers(prev => Math.max(10, Math.min(60, prev + (Math.floor(Math.random() * 3) - 1))));
                }, 5000);
                
                return () => {
                    window.removeEventListener('firebase-ready', handleReady);
                    clearInterval(interval);
                };
            }, []);

            React.useEffect(() => {
                if (!isFirebaseReady) return;
                const initApp = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, setPersistence, browserLocalPersistence, onAuthStateChanged, getFirestore, doc, getDoc, setDoc } = window.FirebaseAPI;
                        let firebaseConfig = { projectId: "demo-project" };
                        if (typeof __firebase_config !== 'undefined') { firebaseConfig = JSON.parse(__firebase_config); }
                        
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        setDbInstance(db);

                        await setPersistence(auth, browserLocalPersistence);

                        onAuthStateChanged(auth, async (currentUser) => {
                            if (currentUser) {
                                try {
                                    const profileRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'main');
                                    const profileSnap = await getDoc(profileRef);
                                    
                                    if (profileSnap.exists()) {
                                        const data = profileSnap.data();
                                        if(!data.learningHistory) data.learningHistory = { beginner: 0, intermediate: 0, advanced: 0 };
                                        setProfile(data);
                                    } else {
                                        const randomName = "ผู้เล่น_" + Math.floor(1000 + Math.random() * 9000);
                                        const newProfile = {
                                            displayName: randomName, scores: { beginner: 0, intermediate: 0, advanced: 0 }, totalScore: 0,
                                            learningHistory: { beginner: 0, intermediate: 0, advanced: 0 }
                                        };
                                        await setDoc(profileRef, newProfile);
                                        setProfile(newProfile);
                                        
                                        const lbRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', currentUser.uid);
                                        await setDoc(lbRef, { displayName: randomName, totalScore: 0, lastUpdated: Date.now() });
                                    }
                                    restoreState(); 
                                } catch (e) { restoreState(); }
                            } else {
                                await signInAnonymously(auth);
                            }
                        });
                    } catch (error) { restoreState(); }
                };
                initApp();
            }, [isFirebaseReady]);

            const playAudio = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = window.innerWidth < 768 ? 0.75 : 0.85; 
                    window.speechSynthesis.speak(utterance);
                }
            };

            const saveProfile = async (newProfile) => {
                setProfile(newProfile); 
                if (!user || !dbInstance) return;
                try {
                    const { doc, setDoc } = window.FirebaseAPI;
                    await setDoc(doc(dbInstance, 'artifacts', appId, 'users', user.uid, 'profile', 'main'), newProfile);
                    await setDoc(doc(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid), {
                        displayName: newProfile.displayName, totalScore: newProfile.totalScore, lastUpdated: Date.now()
                    });
                } catch (error) {}
            };

            const fetchLeaderboard = async () => {
                if (!dbInstance) return;
                setAppState('leaderboard');
                try {
                    const { collection, getDocs } = window.FirebaseAPI;
                    const snapshot = await getDocs(collection(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard'));
                    
                    const mockData = [
                        { id: 'm1', displayName: 'เสี่ยวหง 👧🏻', totalScore: 15 },
                        { id: 'm2', displayName: 'อาหลง 🐉', totalScore: 12 },
                        { id: 'm3', displayName: 'พี่แพนด้า 🐼', totalScore: 8 }
                    ];
                    
                    const list = [...mockData];
                    snapshot.forEach(doc => {
                        if (!list.find(item => item.id === doc.id)) { list.push({ id: doc.id, ...doc.data() }); }
                    });
                    
                    list.sort((a, b) => b.totalScore - a.totalScore);
                    setLeaderboardData(list.slice(0, 20));
                } catch (error) {}
            };

            const handleRename = () => {
                const newName = prompt("ตั้งชื่อในเกมของหนู (ไม่เกิน 15 ตัวอักษร):", profile.displayName);
                if (newName && newName.trim() !== "" && newName.trim() !== profile.displayName) {
                    saveProfile({ ...profile, displayName: newName.trim().substring(0, 15) });
                }
            };

            const startLearning = (level) => {
                setCurrentLevel(level);
                setCurrentIndex(0);
                setIsFlipped(false);
                setAppState('learn');
            };

            const updateLearningProgress = (level, index) => {
                const currentLearned = profile.learningHistory[level] || 0;
                if (index >= currentLearned) {
                    saveProfile({ ...profile, learningHistory: { ...profile.learningHistory, [level]: index + 1 } });
                }
            };

            const startQuiz = (level) => {
                const words = VOCAB_DATA[level].words;
                const shuffled = [...words].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 5); 
                
                const questions = selected.map(word => {
                    const otherWords = words.filter(w => w.ch !== word.ch);
                    const wrongOptions = [...otherWords].sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.th);
                    return { ...word, options: [...wrongOptions, word.th].sort(() => 0.5 - Math.random()) };
                });

                setQuizQuestions(questions);
                setCurrentLevel(level);
                setCurrentIndex(0);
                setScore(0);
                setQuizFeedback(null);
                setShowHint(false);
                setAppState('quiz');
            };

            // ระบบตอบคำถามแบบเกม (หน่วงเวลาโชว์เฉลย)
            const handleAnswer = (selectedOption) => {
                if (quizFeedback) return; // ป้องกันการกดซ้ำระหว่างโชว์เฉลย
                
                const currentQ = quizQuestions[currentIndex];
                const isCorrect = selectedOption === currentQ.th;
                
                setQuizFeedback({ selected: selectedOption, isCorrect: isCorrect, correctOption: currentQ.th });
                if (isCorrect) playAudio(currentQ.ch); // พูดซ้ำถ้าถูก
                
                setTimeout(() => {
                    if (isCorrect) setScore(prev => prev + 1);
                    
                    if (currentIndex < quizQuestions.length - 1) {
                        setCurrentIndex(currentIndex + 1);
                        setQuizFeedback(null);
                        setShowHint(false);
                    } else {
                        const finalScore = isCorrect ? score + 1 : score;
                        const prevBest = profile.scores[currentLevel] || 0;
                        if (finalScore > prevBest) {
                            const newScores = { ...profile.scores, [currentLevel]: finalScore };
                            const newTotal = Object.values(newScores).reduce((a, b) => a + b, 0);
                            saveProfile({ ...profile, scores: newScores, totalScore: newTotal });
                        }
                        setScore(finalScore);
                        setQuizFeedback(null);
                        setAppState('result');
                    }
                }, 1500); // รอ 1.5 วิให้เด็กดูเฉลย
            };

            if (appState === 'loading') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen text-center">
                        <div className="text-6xl animate-bounce mb-4">🐼</div>
                        <h2 className="text-2xl font-bold text-orange-500">กำลังเตรียมเกม...</h2>
                    </div>
                );
            }

            const renderHome = () => (
                <div className="flex flex-col items-center min-h-screen p-4 pb-20 max-w-lg mx-auto w-full">
                    {/* Top Bar */}
                    <div className="w-full flex justify-between items-center bg-white p-3 rounded-full shadow-sm mb-6 border-2 border-orange-100">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={handleRename}>
                            <div className="w-10 h-10 bg-orange-400 text-white rounded-full flex justify-center items-center text-xl font-bold">
                                {profile.displayName.charAt(0) || "👤"}
                            </div>
                            <div className="font-bold text-gray-700 max-w-[100px] truncate">{profile.displayName}</div>
                            <i className="fas fa-pen text-gray-300 text-xs"></i>
                        </div>
                        <div className="flex gap-2">
                            <div className="bg-yellow-100 px-3 py-1 rounded-full flex items-center gap-1 border border-yellow-300 font-bold text-yellow-600">
                                ⭐ {profile.totalScore}
                            </div>
                            <button onClick={fetchLeaderboard} className="w-10 h-10 bg-blue-500 text-white rounded-full flex justify-center items-center shadow-md btn-3d">
                                <i className="fas fa-trophy"></i>
                            </button>
                        </div>
                    </div>

                    {/* Mascot Area */}
                    <div className="text-center mb-8 animate-float">
                        <div className="text-8xl drop-shadow-md mb-2">🐼</div>
                        <div className="bg-white px-6 py-3 rounded-3xl shadow-md border-2 border-gray-100 relative inline-block">
                            <div className="absolute -top-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-l-2 border-t-2 border-gray-100"></div>
                            <h1 className="text-2xl font-black text-orange-500">เก่งภาษาจีนกันเถอะ!</h1>
                            <p className="text-sm text-gray-500 font-medium">เพื่อนกำลังเล่นอยู่ {onlineUsers} คน 🔥</p>
                        </div>
                    </div>

                    {/* Level Cards */}
                    <div className="w-full flex flex-col gap-5">
                        {Object.entries(VOCAB_DATA).map(([key, data], idx) => {
                            const maxScore = profile.scores[key] || 0;
                            const isPerfect = maxScore === 5;
                            const btnColors = ["bg-green-400 border-green-500", "bg-blue-400 border-blue-500", "bg-purple-400 border-purple-500"];
                            const colorClass = btnColors[idx];

                            return (
                                <div key={key} className="bg-white rounded-[32px] p-2 shadow-lg border-b-8 border-gray-200 relative animate-pop" style={{animationDelay: `${idx * 0.1}s`}}>
                                    {isPerfect && (
                                        <div className="absolute -top-3 -right-3 text-4xl animate-bounce z-10 drop-shadow-md">👑</div>
                                    )}
                                    <div className={`rounded-[24px] p-5 flex items-center justify-between ${isPerfect ? 'bg-yellow-50' : ''}`}>
                                        <div className="flex items-center gap-4">
                                            <div className="text-5xl bg-white w-16 h-16 flex items-center justify-center rounded-2xl shadow-sm border-2 border-gray-100">
                                                {data.icon}
                                            </div>
                                            <div>
                                                <h2 className="text-2xl font-black text-gray-800">{data.title}</h2>
                                                <div className="flex text-yellow-400 text-sm mt-1">
                                                    {[...Array(5)].map((_, i) => (
                                                        <i key={i} className={`fa-star ${i < maxScore ? 'fas' : 'far text-gray-300'}`}></i>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 p-2">
                                        <button onClick={() => startLearning(key)} className={`btn-3d py-3 rounded-2xl font-bold text-white text-lg flex items-center justify-center gap-2 ${colorClass}`}>
                                            <i className="fas fa-book-open"></i> เรียน
                                        </button>
                                        <button onClick={() => startQuiz(key)} className={`btn-3d py-3 rounded-2xl font-bold text-white text-lg flex items-center justify-center gap-2 ${maxScore > 0 ? 'bg-orange-400 border-orange-500' : 'bg-gray-300 border-gray-400'}`}>
                                            <i className="fas fa-gamepad"></i> แข่ง
                                        </button>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );

            const renderLearn = () => {
                const words = VOCAB_DATA[currentLevel].words;
                const word = words[currentIndex];
                const progress = ((currentIndex + 1) / words.length) * 100;

                return (
                    <div className="flex flex-col items-center min-h-screen p-4 max-w-md mx-auto w-full bg-white">
                        <div className="w-full flex items-center gap-4 mb-8">
                            <button onClick={() => setAppState('home')} className="w-12 h-12 bg-gray-100 text-gray-600 rounded-full font-bold text-xl btn-3d flex items-center justify-center">
                                <i className="fas fa-times"></i>
                            </button>
                            <div className="flex-grow h-4 bg-gray-200 rounded-full overflow-hidden border-2 border-gray-200">
                                <div className="h-full bg-green-400 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="text-gray-500 font-bold">{currentIndex + 1}/{words.length}</div>
                        </div>

                        <div className={`flip-card w-full aspect-square max-w-[300px] mb-10 cursor-pointer ${isFlipped ? 'flipped' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                            <div className="flip-card-inner w-full h-full relative">
                                <div className="flip-card-front absolute w-full h-full bg-yellow-50 rounded-[40px] shadow-lg flex flex-col items-center justify-center p-6 border-b-[12px] border-yellow-200">
                                    <h1 className="text-[100px] font-black text-red-500 mb-2 leading-none">{word.ch}</h1>
                                    <p className="text-gray-400 font-bold animate-pulse"><i className="fas fa-hand-pointer"></i> แตะเพื่อดูคำแปล</p>
                                </div>
                                <div className="flip-card-back absolute w-full h-full bg-blue-50 rounded-[40px] shadow-lg flex flex-col items-center justify-center p-6 border-b-[12px] border-blue-200">
                                    <h2 className="text-4xl font-bold text-gray-500 mb-4">{word.pinyin}</h2>
                                    <h3 className="text-5xl font-black text-blue-600 text-center">{word.th}</h3>
                                </div>
                            </div>
                        </div>

                        <div className="w-full grid grid-cols-3 gap-4 px-4">
                            <button onClick={() => { if(currentIndex > 0) { setIsFlipped(false); setTimeout(() => setCurrentIndex(currentIndex - 1), 150); }}}
                                disabled={currentIndex === 0} className="btn-3d h-16 bg-gray-100 rounded-2xl text-gray-500 text-2xl">
                                <i className="fas fa-chevron-left"></i>
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); playAudio(word.ch); }}
                                className="btn-3d h-16 bg-green-400 border-green-500 rounded-2xl text-white text-3xl animate-bounce">
                                <i className="fas fa-volume-up"></i>
                            </button>
                            <button onClick={() => { 
                                if(currentIndex < words.length - 1) { 
                                    setIsFlipped(false); 
                                    updateLearningProgress(currentLevel, currentIndex + 1);
                                    setTimeout(() => setCurrentIndex(currentIndex + 1), 150); 
                                } else { startQuiz(currentLevel); }
                            }} className="btn-3d h-16 bg-blue-400 border-blue-500 rounded-2xl text-white text-2xl font-bold">
                                {currentIndex < words.length - 1 ? <i className="fas fa-chevron-right"></i> : "ลุย!"}
                            </button>
                        </div>
                    </div>
                );
            };

            const renderQuiz = () => {
                const question = quizQuestions[currentIndex];
                // Kahoot-like colors for options
                const colors = [
                    "bg-red-500 border-red-600 shadow-red-700/50",
                    "bg-blue-500 border-blue-600 shadow-blue-700/50",
                    "bg-yellow-400 border-yellow-500 shadow-yellow-600/50",
                    "bg-green-500 border-green-600 shadow-green-700/50"
                ];

                return (
                    <div className="flex flex-col items-center min-h-screen p-4 max-w-md mx-auto w-full bg-gray-50">
                        {/* Progress Bar */}
                        <div className="w-full flex gap-1 mb-6">
                            {quizQuestions.map((_, idx) => (
                                <div key={idx} className={`h-3 flex-grow rounded-full ${idx < currentIndex ? 'bg-green-400' : idx === currentIndex ? 'bg-blue-500' : 'bg-gray-200'}`} />
                            ))}
                        </div>

                        {/* Question Card */}
                        <div className={`bg-white w-full rounded-[32px] shadow-sm p-8 mb-6 flex flex-col items-center text-center border-b-8 border-gray-200 ${quizFeedback?.isCorrect === false ? 'animate-shake' : ''}`}>
                            <div className="flex justify-between w-full mb-4">
                                <div className="text-4xl">{quizFeedback ? (quizFeedback.isCorrect ? '🤩' : '😵') : '🤔'}</div>
                                <button onClick={() => playAudio(question.ch)} className="w-12 h-12 bg-blue-100 text-blue-500 rounded-full btn-3d text-xl">
                                    <i className="fas fa-volume-up"></i>
                                </button>
                            </div>
                            <h1 className="text-[80px] font-black text-gray-800 leading-none mb-2">{question.ch}</h1>
                            
                            {/* ตัวช่วย Pinyin */}
                            {showHint ? (
                                <div className="text-2xl font-bold text-gray-400 animate-pop">{question.pinyin}</div>
                            ) : (
                                <button onClick={() => setShowHint(true)} className="text-sm font-bold text-orange-400 bg-orange-50 px-3 py-1 rounded-full border border-orange-200">
                                    💡 กดดูคำอ่าน
                                </button>
                            )}
                        </div>

                        {/* Game Options */}
                        <div className="grid grid-cols-2 gap-3 w-full flex-grow content-start">
                            {question.options.map((opt, idx) => {
                                let btnStyle = `${colors[idx]} text-white`;
                                let icon = null;
                                
                                // Logic จัดการสีปุ่มตอนเฉลย
                                if (quizFeedback) {
                                    if (opt === quizFeedback.correctOption) {
                                        btnStyle = "bg-green-500 border-green-600 scale-105 z-10 shadow-lg text-white"; // ข้อที่ถูกสว่างขึ้น
                                        icon = <i className="fas fa-check-circle text-2xl absolute top-2 right-2"></i>;
                                    } else if (opt === quizFeedback.selected) {
                                        btnStyle = "bg-red-500 border-red-600 opacity-90 text-white"; // ข้อที่กดผิดเป็นสีแดง
                                        icon = <i className="fas fa-times-circle text-2xl absolute top-2 right-2"></i>;
                                    } else {
                                        btnStyle = "bg-gray-200 border-gray-300 text-gray-400 opacity-50"; // ข้ออื่นมืดลง
                                    }
                                }

                                return (
                                    <button 
                                        key={idx}
                                        onClick={() => handleAnswer(opt)}
                                        disabled={quizFeedback !== null}
                                        className={`btn-3d p-6 rounded-3xl font-black text-2xl min-h-[120px] relative transition-all duration-300 border-b-8 ${btnStyle} flex items-center justify-center text-center break-words leading-tight`}
                                        style={{ textShadow: quizFeedback ? 'none' : '0 2px 4px rgba(0,0,0,0.2)' }}
                                    >
                                        {icon}
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                const isPerfect = score === quizQuestions.length;
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto w-full text-center">
                        <div className="bg-white w-full rounded-[40px] shadow-xl p-8 flex flex-col items-center border-b-[16px] border-yellow-300 animate-pop">
                            <div className="text-[120px] mb-2 drop-shadow-lg">
                                {isPerfect ? '🏆' : score > 2 ? '🌟' : '💪'}
                            </div>
                            <h1 className="text-4xl font-black text-gray-800 mb-2">
                                {isPerfect ? 'เพอร์เฟกต์!' : score > 2 ? 'เก่งมาก!' : 'สู้ต่อไป!'}
                            </h1>
                            
                            <div className="bg-gray-50 rounded-3xl w-full py-6 my-6 border-4 border-dashed border-gray-200">
                                <div className="text-gray-400 font-bold mb-2">คะแนนของหนู</div>
                                <div className="flex items-center justify-center gap-2">
                                    <span className="text-7xl font-black text-orange-500">{score}</span>
                                    <span className="text-4xl font-bold text-gray-300">/ 5</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3 w-full">
                                <button onClick={() => setAppState('home')} className="btn-3d py-4 bg-gray-100 rounded-2xl text-gray-600 font-bold text-xl">
                                    <i className="fas fa-home"></i> กลับ
                                </button>
                                <button onClick={() => startQuiz(currentLevel)} className="btn-3d py-4 bg-green-400 border-green-500 rounded-2xl text-white font-bold text-xl">
                                    <i className="fas fa-redo"></i> เล่นอีก
                                </button>
                            </div>
                            <button onClick={fetchLeaderboard} className="btn-3d w-full py-4 mt-3 bg-blue-500 border-blue-600 rounded-2xl text-white font-bold text-xl">
                                <i className="fas fa-trophy"></i> ดูอันดับเพื่อนๆ
                            </button>
                        </div>
                    </div>
                );
            };

            const renderLeaderboard = () => (
                <div className="flex flex-col items-center min-h-screen p-4 max-w-md mx-auto w-full">
                    <div className="w-full flex items-center mb-6">
                        <button onClick={() => setAppState('home')} className="w-12 h-12 bg-white text-gray-600 rounded-full font-bold text-xl btn-3d shadow-sm flex items-center justify-center">
                            <i className="fas fa-arrow-left"></i>
                        </button>
                        <h1 className="text-3xl font-black text-gray-800 ml-4">จัดอันดับ 🏆</h1>
                    </div>

                    <div className="bg-white w-full rounded-[32px] shadow-lg p-2 flex flex-col border-b-8 border-gray-200 max-h-[75vh]">
                        <div className="overflow-y-auto custom-scrollbar p-2 flex-grow">
                            {leaderboardData.map((entry, idx) => {
                                const isMe = entry.id === user?.uid;
                                return (
                                    <div key={entry.id} className={`flex items-center justify-between p-4 mb-3 rounded-2xl ${isMe ? 'bg-orange-100 border-2 border-orange-300' : 'bg-gray-50'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl shadow-sm
                                                ${idx === 0 ? 'bg-yellow-400 text-white text-2xl' : idx === 1 ? 'bg-gray-300 text-white' : idx === 2 ? 'bg-orange-400 text-white' : 'bg-white text-gray-500'}
                                            `}>
                                                {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : idx + 1}
                                            </div>
                                            <div className="flex flex-col">
                                                <span className={`font-bold text-lg ${isMe ? 'text-orange-600' : 'text-gray-700'}`}>
                                                    {entry.displayName}
                                                </span>
                                                {isMe && <span className="text-xs font-bold text-orange-400">นี่คือหนูเอง!</span>}
                                            </div>
                                        </div>
                                        <div className="font-black text-2xl text-yellow-500 flex items-center gap-1">
                                            {entry.totalScore} <i className="fas fa-star text-sm"></i>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="w-full min-h-screen text-gray-900">
                    {appState === 'home' && renderHome()}
                    {appState === 'learn' && renderLearn()}
                    {appState === 'quiz' && renderQuiz()}
                    {appState === 'result' && renderResult()}
                    {appState === 'leaderboard' && renderLeaderboard()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
