<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สนุกกับภาษาจีน ป.4 - ป.6 พร้อมระบบจัดอันดับ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: contain; 
        }
        .flip-card { perspective: 1000px; }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        .pulse-soft { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Custom scrollbar for leaderboard */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // นำเข้าเฉพาะสิ่งที่จำเป็น ตัด signOut ออกเพราะเราจะไม่ให้ผู้เล่นล็อกเอาท์ (จำค่าเครื่อง)
        import { getAuth, signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence, onAuthStateChanged,
            getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        // ข้อมูลคำศัพท์
        const VOCAB_DATA = {
            beginner: {
                title: "ขั้นต้น (ป.4)", color: "from-green-400 to-emerald-500", icon: "🌱",
                words: [
                    { ch: "你好", pinyin: "nǐ hǎo", th: "สวัสดี" }, { ch: "谢谢", pinyin: "xiè xiè", th: "ขอบคุณ" },
                    { ch: "老师", pinyin: "lǎo shī", th: "คุณครู" }, { ch: "一", pinyin: "yī", th: "หนึ่ง (1)" },
                    { ch: "二", pinyin: "èr", th: "สอง (2)" }, { ch: "三", pinyin: "sān", th: "สาม (3)" },
                    { ch: "爸爸", pinyin: "bà ba", th: "พ่อ" }, { ch: "妈妈", pinyin: "mā ma", th: "แม่" },
                    { ch: "水", pinyin: "shuǐ", th: "น้ำ" }, { ch: "不", pinyin: "bù", th: "ไม่" }
                ]
            },
            intermediate: {
                title: "ขั้นกลาง (ป.5)", color: "from-blue-400 to-indigo-500", icon: "⭐",
                words: [
                    { ch: "苹果", pinyin: "píng guǒ", th: "แอปเปิ้ล" }, { ch: "猫", pinyin: "māo", th: "แมว" },
                    { ch: "狗", pinyin: "gǒu", th: "หมา" }, { ch: "吃", pinyin: "chī", th: "กิน" },
                    { ch: "喝", pinyin: "hē", th: "ดื่ม" }, { ch: "朋友", pinyin: "péng you", th: "เพื่อน" },
                    { ch: "今天", pinyin: "jīn tiān", th: "วันนี้" }, { ch: "明天", pinyin: "míng tiān", th: "พรุ่งนี้" },
                    { ch: "大", pinyin: "dà", th: "ใหญ่" }, { ch: "小", pinyin: "xiǎo", th: "เล็ก" }
                ]
            },
            advanced: {
                title: "ขั้นสูง (ป.6)", color: "from-purple-400 to-pink-500", icon: "🏆",
                words: [
                    { ch: "学校", pinyin: "xué xiào", th: "โรงเรียน" }, { ch: "喜欢", pinyin: "xǐ huān", th: "ชอบ" },
                    { ch: "看书", pinyin: "kàn shū", th: "อ่านหนังสือ" }, { ch: "名字", pinyin: "míng zi", th: "ชื่อ" },
                    { ch: "什么", pinyin: "shén me", th: "อะไร" }, { ch: "高兴", pinyin: "gāo xìng", th: "ดีใจ" },
                    { ch: "漂亮", pinyin: "piào liang", th: "สวย" }, { ch: "汉语", pinyin: "hàn yǔ", th: "ภาษาจีน" },
                    { ch: "去", pinyin: "qù", th: "ไป" }, { ch: "买", pinyin: "mǎi", th: "ซื้อ" }
                ]
            }
        };

        const App = () => {
            const [isFirebaseReady, setIsFirebaseReady] = React.useState(!!window.FirebaseAPI);
            const [appState, setAppState] = React.useState('loading'); // loading, setup, home, learn, quiz, result, leaderboard, progress
            const [user, setUser] = React.useState(null);
            
            // ข้อมูลผู้ใช้
            const [profile, setProfile] = React.useState({ 
                displayName: '', 
                scores: { beginner: 0, intermediate: 0, advanced: 0 }, 
                totalScore: 0,
                learningHistory: { beginner: 0, intermediate: 0, advanced: 0 } 
            });
            const [leaderboardData, setLeaderboardData] = React.useState([]);
            const [dbInstance, setDbInstance] = React.useState(null);
            
            // สถานะเกมและการเรียน
            const [currentLevel, setCurrentLevel] = React.useState(null);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);
            const [quizQuestions, setQuizQuestions] = React.useState([]);
            const [setupName, setSetupName] = React.useState("");
            
            // คนออนไลน์จำลอง
            const [onlineUsers, setOnlineUsers] = React.useState(15);
            
            // สถานะปลดล็อกเสียง
            const [audioUnlocked, setAudioUnlocked] = React.useState(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'chinese-kids-app-v2';

            // บันทึกสถานะปัจจุบันเสมอ ยกเว้นตอนกำลังโหลดหรือตั้งชื่อ เพื่อให้เวลารีเฟรชแล้วอยู่หน้าเดิม
            React.useEffect(() => {
                if (appState !== 'loading' && appState !== 'setup') {
                    localStorage.setItem('chineseApp_savedState_v2', JSON.stringify({
                        appState, currentLevel, currentIndex, score, quizQuestions
                    }));
                }
            }, [appState, currentLevel, currentIndex, score, quizQuestions]);

            const restoreState = () => {
                const saved = localStorage.getItem('chineseApp_savedState_v2');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.appState && parsed.appState !== 'setup' && parsed.appState !== 'loading') {
                            setCurrentLevel(parsed.currentLevel);
                            setCurrentIndex(parsed.currentIndex);
                            setScore(parsed.score);
                            setQuizQuestions(parsed.quizQuestions || []);
                            setAppState(parsed.appState);
                            return;
                        }
                    } catch(e) { console.error("Restore state error", e); }
                }
                setAppState('home'); 
            };

            React.useEffect(() => {
                const handleReady = () => setIsFirebaseReady(true);
                window.addEventListener('firebase-ready', handleReady);
                
                // ระบบสุ่มคนออนไลน์หลัก 10 คน
                setOnlineUsers(Math.floor(Math.random() * 80) + 15);
                const interval = setInterval(() => {
                    setOnlineUsers(prev => {
                        const change = Math.floor(Math.random() * 5) - 2; 
                        return Math.max(12, Math.min(99, prev + change));
                    });
                }, 8000);
                
                return () => {
                    window.removeEventListener('firebase-ready', handleReady);
                    clearInterval(interval);
                };
            }, []);

            // ฟังก์ชันปลดล็อกเสียงสำหรับมือถือ (ต้องเรียกผ่าน User Gesture เช่น การคลิก)
            const unlockAudioContext = () => {
                if (!audioUnlocked && 'speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(u);
                    setAudioUnlocked(true);
                }
            };

            React.useEffect(() => {
                if (!isFirebaseReady) return;
                
                const initApp = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, setPersistence, browserLocalPersistence, onAuthStateChanged, getFirestore, doc, getDoc } = window.FirebaseAPI;
                        
                        let firebaseConfig = { projectId: "demo-project" };
                        if (typeof __firebase_config !== 'undefined') {
                            firebaseConfig = JSON.parse(__firebase_config);
                        }
                        
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        setDbInstance(db);

                        // บังคับจำค่าในเครื่อง (ไม่ให้ล็อกเอาท์)
                        await setPersistence(auth, browserLocalPersistence);

                        // จัดการ Auth Flow อย่างรัดกุม
                        const checkUserAndFetchProfile = async (currentUser) => {
                            if (!currentUser) return;
                            setUser(currentUser);
                            try {
                                const profileRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'main');
                                const profileSnap = await getDoc(profileRef);
                                
                                if (profileSnap.exists()) {
                                    const data = profileSnap.data();
                                    if(!data.learningHistory) data.learningHistory = { beginner: 0, intermediate: 0, advanced: 0 };
                                    setProfile(data);
                                    restoreState(); // อ่านค่าจาก LocalStorage แล้วพาไปหน้าที่ค้างไว้
                                } else {
                                    setAppState('setup');
                                }
                            } catch (e) {
                                console.error("Profile fetch error", e);
                                setAppState('setup');
                            }
                        };

                        // ใช้ onAuthStateChanged เพื่อจับสถานะการล็อกอินที่แม่นยำ
                        onAuthStateChanged(auth, async (currentUser) => {
                            if (currentUser) {
                                await checkUserAndFetchProfile(currentUser);
                            } else {
                                // ถ้าไม่มี User ให้สร้างใหม่แบบ Anonymous
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(auth, __initial_auth_token);
                                } else {
                                    await signInAnonymously(auth);
                                }
                            }
                        });

                    } catch (error) {
                        console.error("Firebase Init Error:", error);
                        setAppState('setup'); 
                    }
                };
                initApp();
            }, [isFirebaseReady]);

            const playAudio = (text) => {
                unlockAudioContext(); // ปลดล็อกทุกครั้งที่พยายามเล่น เผื่อพลาด
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = window.innerWidth < 768 ? 0.75 : 0.85; 
                    
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        const zhVoice = voices.find(v => v.lang === 'zh-CN' || v.lang.includes('zh') || v.lang.includes('ZH'));
                        if (zhVoice) utterance.voice = zhVoice;
                    }
                    window.speechSynthesis.speak(utterance);
                }
            };

            const saveProfile = async (newProfile) => {
                setProfile(newProfile); 
                if (!user || !dbInstance) return;
                
                try {
                    const { doc, setDoc } = window.FirebaseAPI;
                    const profileRef = doc(dbInstance, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
                    await setDoc(profileRef, newProfile);
                    
                    const lbRef = doc(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
                    await setDoc(lbRef, {
                        displayName: newProfile.displayName,
                        totalScore: newProfile.totalScore,
                        lastUpdated: Date.now()
                    });
                } catch (error) {
                    console.error("Save profile error:", error);
                }
            };

            const fetchLeaderboard = async () => {
                unlockAudioContext();
                if (!dbInstance) return;
                setAppState('leaderboard');
                try {
                    const { collection, getDocs } = window.FirebaseAPI;
                    const lbCol = collection(dbInstance, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    const snapshot = await getDocs(lbCol);
                    
                    // ระบบแข่งขัน Mock Data เพื่อความท้าทาย
                    const mockData = [
                        { id: 'mock1', displayName: 'เซียนภาษาจีน 🐉', totalScore: 15 },
                        { id: 'mock2', displayName: 'น้องเหมยลี่ 🌸', totalScore: 14 },
                        { id: 'mock3', displayName: 'อาตี๋น้อย 👦', totalScore: 11 },
                        { id: 'mock4', displayName: 'แพนด้าอ้วน 🐼', totalScore: 8 },
                        { id: 'mock5', displayName: 'เสี่ยวหง 🍎', totalScore: 4 }
                    ];
                    
                    const list = [...mockData];
                    snapshot.forEach(doc => {
                        if (!list.find(item => item.id === doc.id)) {
                            list.push({ id: doc.id, ...doc.data() });
                        }
                    });
                    
                    list.sort((a, b) => b.totalScore - a.totalScore);
                    setLeaderboardData(list.slice(0, 50));
                } catch (error) {
                    console.error("Fetch leaderboard error:", error);
                }
            };

            const handleSetupSubmit = (e) => {
                e.preventDefault();
                unlockAudioContext(); // ปลดล็อกเสียงทันทีที่กดตกลง
                if (!setupName.trim()) return;
                const newProfile = { ...profile, displayName: setupName.trim() };
                saveProfile(newProfile);
                setAppState('home');
            };

            const startLearning = (level) => {
                unlockAudioContext();
                setCurrentLevel(level);
                setCurrentIndex(0);
                setIsFlipped(false);
                setAppState('learn');
            };

            const updateLearningProgress = (level, index) => {
                const currentLearned = profile.learningHistory[level] || 0;
                if (index >= currentLearned) {
                    const newHistory = { ...profile.learningHistory, [level]: index + 1 };
                    saveProfile({ ...profile, learningHistory: newHistory });
                }
            };

            const startQuiz = (level) => {
                unlockAudioContext();
                const words = VOCAB_DATA[level].words;
                const shuffled = [...words].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 5); 
                
                const questions = selected.map(word => {
                    const otherWords = words.filter(w => w.ch !== word.ch);
                    const wrongOptions = [...otherWords].sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.th);
                    const options = [...wrongOptions, word.th].sort(() => 0.5 - Math.random());
                    return { ...word, options: options };
                });

                setQuizQuestions(questions);
                setCurrentLevel(level);
                setCurrentIndex(0);
                setScore(0);
                setAppState('quiz');
            };

            const handleAnswer = (selectedOption) => {
                const currentQ = quizQuestions[currentIndex];
                const isCorrect = selectedOption === currentQ.th;
                
                if (isCorrect) setScore(prev => prev + 1);
                
                if (currentIndex < quizQuestions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    const finalScore = isCorrect ? score + 1 : score;
                    const prevBest = profile.scores[currentLevel] || 0;
                    
                    if (finalScore > prevBest) {
                        const newScores = { ...profile.scores, [currentLevel]: finalScore };
                        const newTotal = Object.values(newScores).reduce((a, b) => a + b, 0);
                        saveProfile({ ...profile, scores: newScores, totalScore: newTotal });
                    }
                    setScore(finalScore);
                    setAppState('result');
                }
            };

            if (appState === 'loading') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen text-center p-4">
                        <i className="fas fa-spinner fa-spin w-16 h-16 text-red-500 mb-4 text-6xl"></i>
                        <h2 className="text-2xl font-bold text-gray-600 pulse-soft">กำลังโหลดข้อมูล...</h2>
                    </div>
                );
            }

            if (appState === 'setup') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4" onClick={unlockAudioContext}>
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border-t-8 border-yellow-400 text-center transform transition-all hover:scale-105">
                            <h1 className="text-5xl mb-4 animate-bounce-slow">👋</h1>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">ยินดีต้อนรับ!</h2>
                            <p className="text-gray-600 mb-6 text-md leading-relaxed">
                                มาตั้งชื่อเล่นสำหรับแข่งขันกันเถอะ<br/>
                                <span className="text-sm text-blue-500 bg-blue-50 px-3 py-1 rounded-full mt-2 inline-block">
                                    <i className="fas fa-lock"></i> ระบบจะจำชื่อหนูไว้ในเครื่องอัตโนมัติ
                                </span>
                            </p>
                            <form onSubmit={handleSetupSubmit} className="flex flex-col gap-4">
                                <input 
                                    type="text" 
                                    value={setupName}
                                    onChange={(e) => setSetupName(e.target.value)}
                                    placeholder="ใส่ชื่อเล่นของหนู"
                                    maxLength="15"
                                    required
                                    className="px-6 py-4 rounded-2xl bg-gray-50 border-2 border-gray-200 text-xl font-medium text-center focus:outline-none focus:border-red-400 focus:bg-white transition"
                                />
                                <button type="submit" className="py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-2xl shadow-md text-xl transition flex justify-center items-center gap-2">
                                    <i className="fas fa-rocket"></i> เริ่มเรียนกันเลย!
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 py-10" onClick={unlockAudioContext}>
                    <div className="w-full max-w-4xl flex justify-between items-center bg-white p-4 rounded-3xl shadow-md mb-8 flex-wrap gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-orange-100 text-orange-500 rounded-full flex justify-center items-center text-2xl font-bold border-2 border-orange-200">
                                {profile.displayName.charAt(0) || "👤"}
                            </div>
                            <div>
                                <h3 className="font-bold text-gray-800">{profile.displayName}</h3>
                                <div className="flex items-center gap-2 text-xs mt-1">
                                    <span className="flex items-center gap-1 text-green-600 bg-green-50 px-2 py-1 rounded-full font-medium border border-green-100">
                                        <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                        เพื่อนกำลังออนไลน์ {onlineUsers} คน
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="bg-yellow-50 px-4 py-2 rounded-xl flex items-center gap-2 border border-yellow-200">
                                <i className="fas fa-star text-yellow-500"></i>
                                <span className="font-bold text-yellow-700 text-lg">รวม: {profile.totalScore} คะแนน</span>
                            </div>
                            <button 
                                onClick={() => { unlockAudioContext(); setAppState('progress'); }}
                                className="bg-green-500 hover:bg-green-600 text-white p-3 rounded-xl shadow transition flex items-center gap-2 font-medium">
                                <i className="fas fa-chart-bar"></i> <span className="hidden sm:inline">ความคืบหน้า</span>
                            </button>
                            <button 
                                onClick={fetchLeaderboard}
                                className="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-xl shadow transition flex items-center gap-2 font-medium">
                                <i className="fas fa-trophy"></i> <span className="hidden sm:inline">จัดอันดับ</span>
                            </button>
                            {/* ไม่มีปุ่ม Logout เพื่อให้ล็อคเครื่องผู้เล่นตามที่ขอ */}
                        </div>
                    </div>

                    <div className="text-center mb-10 animate-bounce-slow">
                        <h1 className="text-5xl md:text-6xl font-bold text-red-600 mb-4 drop-shadow-md">
                            🇨🇳 สนุกกับภาษาจีน
                        </h1>
                        <p className="text-xl text-gray-700 font-medium bg-white px-6 py-2 rounded-full shadow-sm inline-block">
                            เลือกบทเรียนที่หนูๆ ต้องการเรียนเลย!
                        </p>
                    </div>

                    <div className="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
                        {Object.entries(VOCAB_DATA).map(([key, data]) => {
                            const maxScore = profile.scores[key] || 0;
                            const isPerfect = maxScore === 5;
                            const wordsLearned = profile.learningHistory[key] || 0;
                            const totalWords = data.words.length;
                            const progressPercent = Math.round((wordsLearned / totalWords) * 100);

                            return (
                                <div key={key} className="bg-white rounded-3xl shadow-xl overflow-hidden transform transition hover:-translate-y-2 border-4 border-transparent hover:border-red-400 relative">
                                    {isPerfect && (
                                        <div className="absolute top-2 right-2 bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-full shadow-md z-10 flex items-center gap-1">
                                            <i className="fas fa-medal"></i> ผ่านแล้ว!
                                        </div>
                                    )}
                                    <div className={`h-28 bg-gradient-to-br ${data.color} flex flex-col items-center justify-center p-4`}>
                                        <div className="text-3xl mb-1">{data.icon}</div>
                                        <h2 className="text-2xl font-bold text-white text-center leading-tight">{data.title}</h2>
                                    </div>
                                    <div className="p-5 flex flex-col gap-3">
                                        <div className="flex flex-col gap-1 mb-2">
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm text-gray-500">เรียนไปแล้ว:</span>
                                                <span className="text-sm font-bold text-gray-700">{progressPercent}%</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                                                <div className="bg-green-500 h-2 rounded-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center bg-gray-50 p-3 rounded-xl mb-2">
                                            <span className="text-sm font-medium text-gray-500">คะแนนสูงสุด:</span>
                                            <span className={`font-bold ${isPerfect ? 'text-green-600' : 'text-blue-600'}`}>
                                                {maxScore} / 5
                                            </span>
                                        </div>
                                        <button 
                                            onClick={() => { updateLearningProgress(key, 0); startLearning(key); }}
                                            className="w-full py-3 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold rounded-xl shadow-md transition flex items-center justify-center gap-2 text-lg">
                                            <i className="fas fa-book-open"></i> เรียนรู้คำศัพท์
                                        </button>
                                        <button 
                                            onClick={() => startQuiz(key)}
                                            className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl shadow-sm transition flex items-center justify-center gap-2 text-lg">
                                            <i className="fas fa-gamepad"></i> ทดสอบความรู้
                                        </button>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );

            const renderProgress = () => (
                <div className="flex flex-col items-center min-h-screen p-4 max-w-2xl mx-auto w-full py-10">
                    <div className="w-full flex justify-between items-center mb-8">
                        <button onClick={() => setAppState('home')} className="p-4 bg-white rounded-full shadow-md text-gray-600 hover:text-red-500 transition">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-2">
                            <i className="fas fa-chart-pie text-green-500"></i> ข้อมูลการเรียนรู้
                        </h1>
                        <div className="w-12"></div>
                    </div>

                    <div className="bg-white w-full rounded-3xl shadow-xl p-8 mb-6 border-t-8 border-green-400">
                        <div className="text-center mb-6">
                            <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex justify-center items-center text-4xl mx-auto mb-4 border-4 border-green-200">
                                📈
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800">สถิติของ {profile.displayName}</h2>
                            <p className="text-gray-500">มาดูกันว่าหนูเรียนไปถึงไหนแล้ว พยายามเข้านะ!</p>
                        </div>

                        <div className="grid gap-6">
                            {Object.entries(VOCAB_DATA).map(([key, data]) => {
                                const wordsLearned = profile.learningHistory[key] || 0;
                                const totalWords = data.words.length;
                                const progressPercent = Math.round((wordsLearned / totalWords) * 100);
                                const maxScore = profile.scores[key] || 0;
                                
                                return (
                                    <div key={key} className="border-b pb-4 last:border-b-0 last:pb-0">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-bold text-lg text-gray-700">{data.icon} {data.title}</span>
                                            <span className="font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-sm">
                                                คะแนนทดสอบ: {maxScore}/5
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center text-sm text-gray-500 mb-1">
                                            <span>เรียนรู้คำศัพท์ไปแล้ว</span>
                                            <span>{wordsLearned} / {totalWords} คำ ({progressPercent}%)</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                            <div className="bg-gradient-to-r from-green-400 to-green-500 h-3 rounded-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            const renderLeaderboard = () => (
                <div className="flex flex-col items-center min-h-screen p-4 max-w-2xl mx-auto w-full py-10">
                    <div className="w-full flex justify-between items-center mb-8">
                        <button onClick={() => setAppState('home')} className="p-4 bg-white rounded-full shadow-md text-gray-600 hover:text-red-500 transition">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-2">
                            <i className="fas fa-trophy text-yellow-500"></i> กระดานผู้นำ
                        </h1>
                        <div className="w-12"></div>
                    </div>

                    <div className="bg-white w-full rounded-3xl shadow-xl overflow-hidden flex flex-col max-h-[70vh]">
                        <div className="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-white text-center">
                            <p className="opacity-80 text-sm mb-1">สุดยอดนักเรียนภาษาจีน</p>
                            <h2 className="text-2xl font-bold">ใครทำคะแนนรวมได้ 15 คะแนนบ้าง?</h2>
                        </div>
                        
                        <div className="overflow-y-auto custom-scrollbar p-2 flex-grow">
                            {leaderboardData.length === 0 ? (
                                <div className="p-10 text-center text-gray-500">
                                    <i className="fas fa-ghost w-12 h-12 mx-auto mb-2 opacity-50 text-4xl"></i>
                                    <p>กำลังโหลดข้อมูลผู้เล่น...</p>
                                </div>
                            ) : (
                                leaderboardData.map((entry, idx) => (
                                    <div key={entry.id} className={`flex items-center justify-between p-4 mb-2 rounded-2xl ${idx === 0 ? 'bg-yellow-50 border border-yellow-200 shadow-sm transform scale-100 hover:scale-105 transition' : idx === 1 ? 'bg-gray-50 border border-gray-200' : idx === 2 ? 'bg-orange-50 border border-orange-100' : 'bg-white hover:bg-gray-50'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shadow-sm
                                                ${idx === 0 ? 'bg-yellow-400 text-yellow-900' : idx === 1 ? 'bg-gray-300 text-gray-800' : idx === 2 ? 'bg-orange-300 text-orange-900' : 'bg-blue-100 text-blue-800'}
                                            `}>
                                                {idx + 1}
                                            </div>
                                            <span className={`font-bold ${idx < 3 ? 'text-lg' : 'text-md'} ${entry.id === user?.uid ? 'text-blue-600' : 'text-gray-700'}`}>
                                                {entry.displayName} {entry.id === user?.uid && <span className="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full ml-1">(หนูเอง)</span>}
                                            </span>
                                        </div>
                                        <div className="font-black text-xl text-yellow-600 flex items-center gap-1">
                                            {entry.totalScore} <span className="text-sm font-normal text-gray-400">/ 15</span> <i className="fas fa-star text-yellow-400 ml-1"></i>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderLearn = () => {
                const words = VOCAB_DATA[currentLevel].words;
                const word = words[currentIndex];

                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto w-full">
                        <div className="w-full flex justify-between items-center mb-6">
                            <button onClick={() => setAppState('home')} className="p-4 bg-white rounded-full shadow-md text-gray-600 hover:text-red-500 transition">
                                <i className="fas fa-home text-xl"></i>
                            </button>
                            <div className="text-lg font-bold text-gray-700 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100">
                                คำที่ {currentIndex + 1} / {words.length}
                            </div>
                            <div className="w-12"></div>
                        </div>

                        <div 
                            className={`flip-card w-full aspect-square mb-8 cursor-pointer ${isFlipped ? 'flipped' : ''}`}
                            onClick={() => setIsFlipped(!isFlipped)}
                        >
                            <div className="flip-card-inner w-full h-full relative">
                                <div className="flip-card-front absolute w-full h-full bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-6 border-8 border-yellow-300">
                                    <h1 className="text-8xl font-bold text-red-600 mb-6">{word.ch}</h1>
                                    <p className="text-gray-500 text-lg flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                                        <i className="fas fa-hand-pointer text-yellow-500 animate-pulse"></i> แตะเพื่อดูคำแปล
                                    </p>
                                </div>
                                <div className="flip-card-back absolute w-full h-full bg-red-50 rounded-3xl shadow-xl flex flex-col items-center justify-center p-6 border-8 border-red-400">
                                    <h2 className="text-4xl font-bold text-gray-800 mb-2">{word.pinyin}</h2>
                                    <div className="w-16 h-1 bg-red-300 my-4 rounded-full"></div>
                                    <h3 className="text-5xl font-bold text-blue-600 mb-8 text-center">{word.th}</h3>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-between items-center w-full mb-6">
                            <button 
                                onClick={() => { 
                                    if(currentIndex > 0) { 
                                        setIsFlipped(false); 
                                        setTimeout(() => {
                                            setCurrentIndex(currentIndex - 1);
                                            updateLearningProgress(currentLevel, currentIndex - 1);
                                        }, 150); 
                                    }
                                }}
                                disabled={currentIndex === 0}
                                className={`p-5 rounded-full shadow-md transition ${currentIndex === 0 ? 'bg-gray-200 text-gray-400' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>
                                <i className="fas fa-chevron-left text-2xl"></i>
                            </button>

                            <button 
                                onClick={(e) => { e.stopPropagation(); playAudio(word.ch); }}
                                className="p-6 bg-green-500 hover:bg-green-600 text-white rounded-full shadow-lg transition transform hover:scale-110 flex flex-col items-center pulse-soft relative">
                                <i className="fas fa-volume-up text-3xl"></i>
                                <span className="absolute -top-2 -right-2 bg-yellow-400 text-xs font-bold px-2 py-1 rounded-full text-yellow-900 shadow border border-yellow-200">ฟังเสียง</span>
                            </button>

                            <button 
                                onClick={() => { 
                                    if(currentIndex < words.length - 1) { 
                                        setIsFlipped(false); 
                                        setTimeout(() => {
                                            setCurrentIndex(currentIndex + 1);
                                            updateLearningProgress(currentLevel, currentIndex + 1);
                                        }, 150); 
                                    }
                                }}
                                disabled={currentIndex === words.length - 1}
                                className={`p-5 rounded-full shadow-md transition ${currentIndex === words.length - 1 ? 'bg-gray-200 text-gray-400' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>
                                <i className="fas fa-chevron-right text-2xl"></i>
                            </button>
                        </div>
                        
                        {currentIndex === words.length - 1 && (
                            <button onClick={() => startQuiz(currentLevel)} className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold text-xl rounded-2xl shadow-lg transition flex justify-center items-center gap-2 animate-bounce mt-4">
                                <i className="fas fa-gamepad"></i> ลองทำแบบทดสอบเลย!
                            </button>
                        )}
                    </div>
                );
            };

            const renderQuiz = () => {
                const question = quizQuestions[currentIndex];

                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto w-full">
                        <div className="w-full flex justify-between items-center mb-8">
                            <button onClick={() => setAppState('home')} className="p-4 bg-white rounded-full shadow-md text-gray-600 hover:text-red-500 transition">
                                <i className="fas fa-times text-xl"></i>
                            </button>
                            <div className="flex gap-2 bg-white px-4 py-2 rounded-full shadow-sm">
                                {quizQuestions.map((_, idx) => (
                                    <div key={idx} className={`w-3 h-3 rounded-full transition-all ${idx < currentIndex ? 'bg-green-400' : idx === currentIndex ? 'bg-blue-500 scale-125' : 'bg-gray-200'}`} />
                                ))}
                            </div>
                            <div className="w-12 font-bold text-gray-500 text-right bg-white px-3 py-2 rounded-xl shadow-sm">{currentIndex + 1}/{quizQuestions.length}</div>
                        </div>

                        <div className="bg-white w-full rounded-3xl shadow-xl p-8 mb-8 flex flex-col items-center text-center border-t-8 border-blue-500 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-5"><i className="fas fa-brain text-6xl"></i></div>
                            <h2 className="text-gray-500 text-lg mb-2 relative z-10 font-medium">คำนี้แปลว่าอะไร?</h2>
                            <h1 className="text-7xl font-bold text-red-600 mb-6 relative z-10">{question.ch}</h1>
                            <button 
                                onClick={() => playAudio(question.ch)}
                                className="px-5 py-3 bg-blue-50 text-blue-600 font-medium rounded-full hover:bg-blue-100 flex items-center gap-2 transition relative z-10 shadow-sm">
                                <i className="fas fa-volume-up"></i> ฟังเสียงอีกครั้ง
                            </button>
                        </div>

                        <div className="grid grid-cols-1 gap-4 w-full">
                            {question.options.map((opt, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => handleAnswer(opt)}
                                    className="w-full py-4 px-6 bg-white hover:bg-blue-50 hover:border-blue-400 border-2 border-gray-100 text-gray-800 font-bold text-xl rounded-2xl shadow-sm transition transform hover:-translate-y-1 text-left flex justify-between items-center group">
                                    <span>{opt}</span>
                                    <div className="w-6 h-6 rounded-full border-2 border-gray-300 group-hover:border-blue-400 transition-colors"></div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                const isPerfect = score === quizQuestions.length;
                const isGood = score >= quizQuestions.length / 2;
                
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto w-full text-center">
                        <div className={`bg-white w-full rounded-3xl shadow-2xl p-10 flex flex-col items-center border-t-8 ${isPerfect ? 'border-yellow-400' : isGood ? 'border-green-400' : 'border-orange-400'}`}>
                            <div className="text-8xl mb-6 animate-bounce">
                                {isPerfect ? '🏆' : isGood ? '⭐' : '💪'}
                            </div>
                            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                                {isPerfect ? 'สุดยอด! เก่งมากๆ เลย' : isGood ? 'ทำได้ดีมาก พยายามอีกนิด!' : 'ไม่เป็นไรนะ ลองใหม่ได้!'}
                            </h1>
                            <p className="text-lg text-gray-500 mb-6">คะแนนที่หนูทำได้ในรอบนี้</p>
                            
                            <div className="flex items-end justify-center gap-2 mb-10 bg-gray-50 px-8 py-4 rounded-3xl border border-gray-100">
                                <span className={`text-7xl font-black ${isPerfect ? 'text-yellow-500' : isGood ? 'text-green-500' : 'text-orange-500'}`}>{score}</span>
                                <span className="text-4xl font-bold text-gray-300 mb-2">/ {quizQuestions.length}</span>
                            </div>

                            <div className="flex flex-col gap-4 w-full">
                                <button 
                                    onClick={() => startQuiz(currentLevel)}
                                    className="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold text-xl rounded-2xl shadow-md transition flex justify-center items-center gap-2">
                                    <i className="fas fa-redo"></i> เล่นอีกครั้ง
                                </button>
                                <button 
                                    onClick={() => setAppState('home')}
                                    className="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xl rounded-2xl shadow-sm transition flex justify-center items-center gap-2">
                                    <i className="fas fa-home"></i> กลับไปหน้าหลัก
                                </button>
                                <button 
                                    onClick={fetchLeaderboard}
                                    className="w-full py-4 mt-2 border-2 border-blue-500 text-blue-600 hover:bg-blue-50 font-bold text-lg rounded-2xl transition flex justify-center items-center gap-2">
                                    <i className="fas fa-trophy"></i> ดูอันดับของหนู
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full min-h-screen text-gray-900">
                    {appState === 'home' && renderHome()}
                    {appState === 'learn' && renderLearn()}
                    {appState === 'quiz' && renderQuiz()}
                    {appState === 'result' && renderResult()}
                    {appState === 'leaderboard' && renderLeaderboard()}
                    {appState === 'progress' && renderProgress()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
